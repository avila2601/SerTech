<div class="container">
  <div class="technicians-header">
    <h1>Expert Technicians</h1>
    <p>Select your preferred technician</p>
  </div>

  <div class="technicians-grid">
    <div *ngFor="let technician of technicians" class="technician-card">
      <div class="technician-header">
        <div class="technician-avatar">
          <img
            [src]="technician.photo || getRandomAvatar(technician.id)"
            alt="Technician Avatar"
          />
        </div>
        <div class="technician-info">
          <h3>{{ technician.name }}</h3>
        </div>
      </div>
      <p class="specialty">{{ technician.specialty }}</p>
      <div class="rating-section">
        <div class="rating-info">
          <div class="stars">
            <span class="star">★</span>
          </div>
          <span class="rating-value">{{ technician.rating }}</span>
        </div>
        <button
          class="btn btn-primary btn-comments"
          (click)="openReviewModal(technician.id)"
        >
          View Reviews
        </button>
      </div>
      <div class="technician-actions">
        <button
          class="btn btn-primary"
          [disabled]="!technician.available"
          (click)="selectTechnician(technician)"
        >
          {{ technician.available ? "Select" : "Unavailable" }}
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="technicians.length === 0" class="no-technicians">
    <p>No technicians available at this time.</p>
  </div>

  <div class="actions">
    <button class="btn btn-secondary" (click)="goBackToServices()">
      Back to Services
    </button>
  </div>

  <app-technician-reviews-modal
    *ngIf="showReviewModal"
    [technicianId]="technicianIdModal"
    (close)="closeReviewModal()"
  ></app-technician-reviews-modal>
</div>
